<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Mio Compito</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      .messaggio {
        background: #f4f4f4;
        margin: 5px 0;
        padding: 10px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <h1>E-Commerce webpage</h1>

    <input type="text" id="inputMessaggio" placeholder="Scrivi qualcosa..." />
    <button onclick="inviaDati()">Invia al Server</button>
    <button onclick="caricaDati()">Aggiorna Lista</button>

    <div id="listaMessaggi"></div>

    <script>
      // ATTENZIONE: Per ora usiamo localhost.
      // Domani, una volta messo il backend su Render, cambierai questo URL.
      const API_URL = "https://mio-backend-verifica.onrender.com/api/messages";

      async function acquista(idProdotto) {
        const res = await fetch(`${API_URL}/buy`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prodottoId: idProdotto, utenteId: 1 }), // ID utente fisso per il test
        });

        if (res.ok) {
          alert("Acquisto effettuato!");
          caricaCatalogo(); // Funzione che rifà la GET dei prodotti
        } else {
          const err = await res.json();
          alert("Errore: " + err.error);
        }
      }
    </script>
  </body>
</html>
